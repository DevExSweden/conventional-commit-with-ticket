name: Conventional Commit with Ticket
description: Validate PR titles against Conventional Commits and optionally enforce a ticket key.
inputs:
  app-token:
    description: The token to use to create the comment and label the PR.
    required: true
  ticket-key-pattern:
    description: >
      Regex pattern a ticket key must match (e.g. `(PROJ|TEAM)-[0-9]{2,5}`).
      When omitted, ticket key validation is skipped entirely.
    required: false
    default: ""
  require-ticket-for-types:
    description: >
      Comma-separated list of commit types that require a ticket key.
      Only used when ticket-key-pattern is set.
    required: false
    default: "feat,fix,perf,security,refactor"
runs:
  using: 'composite'
  steps:
    - name: Validate Conventional Commits
      id: validate
      continue-on-error: true
      uses: ytanikin/pr-conventional-commits@b628c5a234cc32513014b7bfdd1e47b532124d98
      with:
        task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert","security","wip"]'
        custom_labels: >-
          {"feat": "feature", "fix": "fix", "docs": "documentation",
           "test": "test", "ci": "CI/CD", "refactor": "refactor",
           "perf": "performance", "chore": "chore", "revert": "revert",
           "wip": "WIP"}
        token: ${{ inputs.app-token }}

    - name: Enforce Ticket Key
      id: enforce-ticket-key
      continue-on-error: true
      shell: bash
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        TICKET_KEY_PATTERN: ${{ inputs.ticket-key-pattern }}
        REQUIRE_TICKET_FOR_TYPES: ${{ inputs.require-ticket-for-types }}
      run: |
        bash ${GITHUB_ACTION_PATH}/scripts/enforce_ticket_key.sh "${{ github.event.pull_request.title }}"
        
    - name: Report Conventional Commit failure
      if: steps.enforce-ticket-key.outcome == 'failure' || steps.validate.outcome == 'failure'
      shell: bash
      run: |
        {
          echo "## Conventional Commit validation failed."
          echo
          echo "Please update the PR title to follow Conventional Commits."
          echo
          echo "- Allowed types: feat, fix, docs, test, ci, refactor, perf, chore, revert, security, wip"
          if [[ -n "${{ inputs.ticket-key-pattern }}" ]]; then
            echo "- Ticket key is required for: ${{ inputs.require-ticket-for-types }}"
            echo "- Ticket key must match pattern: \`${{ inputs.ticket-key-pattern }}\`"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fail job when validation fails
      shell: bash
      if: steps.enforce-ticket-key.outcome == 'failure' || steps.validate.outcome == 'failure'
      run: |
        echo "Failing job because Conventional Commit or ticket validation failed."
        exit 1

      
